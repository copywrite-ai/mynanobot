services:
  bot:
    build: .
    container_name: mynanocloud-bot
    volumes:
      - .:/app
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - LM_STUDIO_URL=${LM_STUDIO_URL}
      - LM_MODEL=${LM_MODEL}
      - LM_API_KEY=${LM_API_KEY}
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
