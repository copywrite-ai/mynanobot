services:
  bot:
    build: .
    container_name: mynanocloud-bot
    volumes:
      - .:/app
    environment:
      # Use host.docker.internal to access LM Studio on the host
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
